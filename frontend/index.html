<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/favicon.ico">
    <title>IETT Vakit</title>
</head>
<body>
    <script type="module" src="dist/script.js" defer="true"></script>

    <h1>OTBÜS SAAT</h1>

    <div class="container">
        <div class="controls">
            <input type="text" class="busCodeInput" id="busCodeInput" placeholder="Hat Kodu Örn: 25Y"> 

            <button class="btn addBusList" id="addBusList">Otobüs ekle</button>
        </div>

        <h2> Otbüs listesi</h2>

        <div class="busListWrapper" id="busListWrapper">
            <ul class="busList" id="busList">
                <button class="" id="busListButton"><li>25Y</li></button>
                <button class="" id="busListButton"><li>59HS</li></button>
                <button class="" id="busListButton"><li>500T</li></button>
                <button class="" id="busListButton"><li>HM3</li></button>
                <button class="" id="busListButton"><li>76</li></button>
            </ul>
        </div>

        <div class="dataPanel" id="dataPanel">
            <p>Select or add a bus into the bus list</p>
        </div>

        <ul></ul>
    </div>
</body>
</html>
