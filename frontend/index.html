<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/favicon.ico">
    <title>IETT API</title>
</head>
<body>
    <script type="module" src="dist/script.js" defer="true"></script>

    <h1>OTBÜS SAAT</h1>

    <div class="container">
        <div class="controls">
            <input type="text" class="busCodeInput" id="busCodeInput" placeholder="Hat Kodu Örn: 25Y"> 

            <button class="btn busTableBtn" id="busTableBtn">Otobüs ekle</button>
        </div>

            <table class="busTable">
                <thead>
                    <tr>
                        <th>Otobüsler</th>
                        <th>En yakın birinci saat</th>
                        <th>En yakın ikinci saat</th>
                        <th class="colAction">Sil</th>
                    </tr>
                </thead>
                <tbody>

                </tbody>
            </table>

            <button class="btn departureTimeBtn" id="departureTimeBtn">Press for ze departure times</button>

        <h2>DUYURULARARAR</h2>

        <table class="announcementTable">
            <thead>
                <tr>
                    <th>Otobüs Numarası</th>
                    <th>Mesaj</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
    </div>
</body>
</html>
