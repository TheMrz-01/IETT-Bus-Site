<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/favicon.ico">
    <title>IETT Vakit</title>
</head>
<body>
    <script type="module" src="dist/script.js" defer="true"></script>

    <h1>OTBÜS SAAT</h1>

    <div class="container">
        <div class="controls">
            <input type="text" class="busCodeInput" id="busCodeInput" placeholder="Hat Kodu Örn: 25Y" uppercase> 

            <button class="btn addBusList" id="addBusList">Otobüs ekle</button>
        </div>

        <div>
        <h2> Otbüs listesi</h2>

        <!-- Fetch button -->
        <div class="fetchControls">
            <p class="fetchText">Saatleri Güncelle</p>
            <img class="fetchBtn" src="/../../assets/fetch.png" width="20px" height="20px" alt="Saatleri güncelle"> 
        </div>

        <div class="busListWrapper" id="busListWrapper">
            <ul class="busList" id="busList">
            </ul>
        </div>

        
        <div class="dataPanel" id="dataPanel">
            <p class="enable theThing" id="element">Select or add a bus into the bus list</p>

            <button class="btn disable removeBus" id="element">Otobüsü çıkar</button>

            <!-- I need to climb a big stone rn -->

            <div class="disable directionControl" id="element">
                <p class="gidis">Haciosman</p>
                <img class="changeDirection"src="/../../assets/changeDirection.png" width="20px" height="20px" alt="Yon degistir">
                <p class="gelis">Yeni Uyum</p>
                <p class="directionType"></p>
                <br>
            </div>

            <div class="disable remainingTime" id="element">
                <p id="first">En Yakın Birinci Kalkış: </p>
                <p id="second">En Yakın İkinci Kalkış: </p>
            </div>

            <div class="disable announcementTexts" id="element">
                <h3>Duyurular</h3>
                <p id="announcementText"></p>
            </div>

            <div class="disable timeTable" id="element">
                <h3>Saatler</h3>
                <div class="workDays"> <p>Hafta İçi</p> <ul id="times"></ul></div>
                <div class="saturday"> <p>Cumartesi</p> <ul id="times"></ul></div>
                <div class="sunday"> <p>Pazar</p> <ul id="times"></ul></div>
            </div>
        </div>
    </div>
</body>
</html>
